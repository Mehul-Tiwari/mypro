<header class="student-header">
  <!-- Top Navigation Bar -->
  <div class="top-bar">
    <div class="top-bar-container">
      <!-- Logo -->
      <div class="logo">
        <h2>EduHub</h2>
      </div>

      <!-- Main Navigation -->
      <nav class="main-nav">
        <button class="nav-item">Courses ▾</button>
        <button class="nav-item">Programs ▾</button>
        <button class="nav-item">Students ▾</button>
        <button class="nav-item">Resources ▾</button>
      </nav>

      <!-- Right Actions -->
      <div class="top-actions">
        <button class="icon-btn-with-label" title="Home" (click)="navigateToSection('home')">
          <span class="icon">🏠</span>
          <span class="label">Home</span>
        </button>
        <!-- Profile Dropdown -->
        <div class="profile-dropdown" [class.open]="isProfileOpen">
          <button class="profile-btn" (click)="toggleProfileDropdown()" title="Profile Menu">
            <span class="profile-avatar">{{ userInitials }}</span>
          </button>
          <div class="dropdown-menu" *ngIf="isProfileOpen">
            <div class="dropdown-header">
              <div class="user-info">
                <p class="user-name">{{ userName }}</p>
                <p class="user-email">{{ userEmail }}</p>
              </div>
            </div>
            <hr class="dropdown-divider">
            <button class="dropdown-item" (click)="navigateToProfile()">
              <span class="icon">👤</span>
              View Profile
            </button>
            <button class="dropdown-item" (click)="onLogout()">
              <span class="icon">🚪</span>
              Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Secondary Navigation Bar -->
  <div class="secondary-bar">
    <div class="secondary-bar-container">
      <!-- Search Bar -->
      <div class="search-wrapper">
        <input type="text" placeholder="Try courses, schedule, leave, anything!" />
        <span class="search-icon">🔍</span>
      </div>

      <!-- Category Pills -->
      <div class="category-pills">
        <button class="pill" (click)="navigateToSection('course')">
          <span class="icon">📚</span>
          <span>Course</span>
        </button>
        <button class="pill" (click)="navigateToSection('schedule')">
          <span class="icon">🎓</span>
          <span>Schedule</span>
        </button>
        <button class="pill" (click)="navigateToSection('assignment')">
          <span class="icon">✏️</span>
          <span>Assignment</span>
        </button>
        <button class="pill" (click)="navigateToSection('leave')">
          <span class="icon">📝</span>
          <span>Leave</span>
        </button>
        <button class="pill" (click)="navigateToSection('projects')">
          <span class="icon">📁</span>
          <span>Projects</span>
        </button>
        <button class="pill" (click)="navigateToSection('docs')">
          <span class="icon">📄</span>
          <span>Docs</span>
        </button>
      </div>
    </div>
  </div>
</header>
